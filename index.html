<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme: apply class before paint to prevent flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (t === "light") document.documentElement.classList.add("light");
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/logoGold.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Malika Drums — Professional Drummer</title>
    <meta
      name="description"
      content="Malika Degaldoruwa — Professional drummer. Versatile grooves & powerful beats. TikTok @MalikaDrums."
    />

    <!-- Google Fonts: Oswald (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
